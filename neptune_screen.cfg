# Neptune 3 Klipper Screen configuration
#
# Place this file alongside neptune_screen.py, or specify its path
# with the -c / --config command-line flag.

[neptune_screen]

# Klipper Unix socket path
#socket: /tmp/klippy_uds

# serial_bridge name from printer.cfg
#serial_bridge: screen

# Neptune variant: 3Pro, 3Plus, or 3Max
#variant: 3Pro

# LED name for the light toggle button on the screen
#led: my_led

# Heater names to display on the main screen (comma-separated)
#heater: extruder, heater_bed

# Path to gcode files directory
#gcodes_dir: ~/printer_data/gcodes

# Screen update interval in seconds
#update_interval: 2

# Enable debug logging
#logging: false
